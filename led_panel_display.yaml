# this is a a home assistant configuration file for a led panel display
# it uses esp32 microcontroller and an LED SMD panel
  # specifications of the led panel display:
    # Size: 160mm(H)×320mm(H)
    # Module Resolution: 64(H)×128(V)
    # Pitch: 2.5mm
    # Density: 160.000 pixels/m²
    # LED Lamps: SMD2121(Customizable Nationstar lamp)
    # Driver IC: FM6124/Chipone2037
    # Module Refresh: 1920hz
    # Mask: No
    # The panel has a Hub75e connection, meaning the pins "d" and "e" are available for use and are not connected to GNG from the front
  # Esp32 microcontroller specifications:
    # Model: ESP32-S3-DevKitC-1-N16R8
    # Microcontroller: ESP32-S3
    # Flash: 16MB
    # RAM: 512KB
    # Connectivity: Wi-Fi 802.11 b/g/n, Bluetooth v5.0
    # Power Supply: 5V DC
    
  # connection between the led panel display and the esp32 microcontroller:
    # The led panel display is connected to the esp32 microcontroller using a 16-pin ribbon cable.
    # The pinout of the led panel display is as follows:
      # Pin 1: GND
      # Pin 2: VCC
      # Pin 3: R1
      # Pin 4: G1
      # Pin 5: B1
      # Pin 6: R2
      # Pin 7: G2
      # Pin 8: B2
      # Pin 9: A
      # Pin 10: B
      # Pin 11: C
      # Pin 12: D
      # Pin 13: E
      # Pin 14: CLK
      # Pin 15: LAT
      # Pin 16: OE

substitutions:
  # Use a path inside /config so ESPHome can access files during compile.
  logo_base_path: /config/esphome/logos
  # Attribute containing the current game's team logo URL.
  team_logo_attribute: team_logo
  team_score_attribute: team_score
  opponent_score_attribute: opponent_score
  team_colors_attribute: team_colors
  opponent_colors_attribute: opponent_colors
  next_game_datetime_attribute: date
  timbers_tracker_entity: sensor.mls_portland_timbers
  hurricanes_tracker_entity: sensor.nhl_carolina_hurricanes
  rangers_tracker_entity: sensor.nhl_new_york_rangers
  avalanche_tracker_entity: sensor.nhl_colorado_avalanche
  canadiens_tracker_entity: sensor.nhl_montreal_canadiens

  room_brightness_sensor: sensor.living_room_occupancy_illuminance

esphome:
  name: "livingroom-team-score-display"
  friendly_name: "Living Room Team Score Display"
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  variant: esp32s3

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

display:
  - platform: hub75
    id: led_panel_display
    panel_width: 128
    panel_height: 64
    update_interval: 1s
    r1_pin: GPIO4
    g1_pin: GPIO5
    b1_pin: GPIO6
    r2_pin: GPIO7
    g2_pin: GPIO8
    b2_pin: GPIO9
    a_pin: GPIO10
    b_pin: GPIO11
    c_pin: GPIO12
    d_pin: GPIO13
    e_pin: GPIO14
    clk_pin: GPIO15
    lat_pin: GPIO16
    oe_pin: GPIO17
    rotation: 90