# Board: Generic ESP32-S3 Board (Generic)
# Definition: definitions/boards/generic-esp32s3/manifest.yaml

esphome:
  name: game-board
  friendly_name: game-board

esp32:
  variant: esp32s3
  framework:
    type: esp-idf



api:
  encryption:
    key: !secret game_board__encryption_key
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: game-board Fallback Hotspot
    password: !secret game_board__ap_password
captive_portal:

  
substitutions:
  # Use a path inside /config so ESPHome can access files during compile.
  logo_base_path: /config/esphome/logos
  # Attribute containing the current game's team logo URL.
  team_logo_attribute: team_logo
  opponent_logo_attribute: opponent_logo
  team_score_attribute: team_score
  opponent_score_attribute: opponent_score
  team_colors_attribute: team_colors
  opponent_colors_attribute: opponent_colors
  next_game_datetime_attribute: date
  timbers_tracker_entity: sensor.mls_portland_timbers
  hurricanes_tracker_entity: sensor.nhl_carolina_hurricanes
  rangers_tracker_entity: sensor.nhl_new_york_rangers
  avalanche_tracker_entity: sensor.nhl_colorado_avalanche
  canadiens_tracker_entity: sensor.nhl_montreal_canadiens

  room_brightness_sensor: sensor.living_room_occupancy_illuminance

globals:
  # this global variable will hold the current team being displayed on the scoreboard, so we can determine if we need to update the display when the game state changes.
  - id: selected_team
    type: std::string
    restore_value: true
    initial_value: "Auto"
  - id: displayed_state
    type: std::string
    restore_value: true
  - id: displayed_season
    type: std::string
    restore_value: true
  - id: displayed_logo
    type: std::string
    restore_value: true
  - id: displayed_opponent_logo
    type: std::string
    restore_value: true
  - id: displayed_team_colors
    type: std::string
    restore_value: true
  - id: displayed_opponent_colors
    type: std::string
    restore_value: true
  - id: displayed_next_game_datetime
    type: std::string
    restore_value: true
  - id: displayed_team_score
    type: std::string
    restore_value: true
  - id: displayed_opponent_score
    type: std::string
    restore_value: true



# Enable logging
logger:

# get the current time from Home Assistant to display the next game time on the scoreboard
time:
  - platform: homeassistant
    id: my_time
    timezone: "America/Los_Angeles"

image:
  - file: ${logo_base_path}/timbers.png
    id: timbers_logo_image
    resize: 64x64
    type: RGB565
  - file: ${logo_base_path}/canes.png
    id: hurricanes_logo_image
    resize: 64x64
    type: RGB565
  - file: ${logo_base_path}/rangers.png
    id: rangers_logo_image
    resize: 64x64
    type: RGB565
  - file: ${logo_base_path}/avalanche.png
    id: avalanche_logo_image
    resize: 64x64
    type: RGB565
  - file: ${logo_base_path}/canadiens.png
    id: canadiens_logo_image
    resize: 64x64
    type: RGB565
  - file: ${logo_base_path}/blank.png
    id: blank_logo_image
    resize: 64x64
    type: RGB565



display:
  - platform: hub75
    id: led_panel_display
    shift_driver: FM6124
    # we will have the brightness adjusted by the room brightness sensor, so set a default value.
    # can be set between 0-255, where 0 is off and 255 is full brightness.
    brightness : 128
    panel_width: 128
    panel_height: 64
    # update_interval: 16ms
    # we will update the display using scripts (display.update: led_panel_display) so set the update interval to never.
    update_interval: never
    r1_pin: GPIO18
    g1_pin: GPIO8
    b1_pin: GPIO17
    r2_pin: GPIO16
    b2_pin: GPIO15
    g2_pin: GPIO1
    a_pin: GPIO7
    b_pin: GPIO48
    c_pin: GPIO6
    d_pin: GPIO47
    e_pin: GPIO2
    clk_pin: GPIO5
    lat_pin: GPIO21
    oe_pin: GPIO4
    rotation: 0
    # create pages for each team's game board display
    # pages:
      
# get the current state of each team from the Home Assistant sensor and display it on the scoreboard
text_sensor:
  # Timbers
    - &timbers_tracker
      platform: homeassistant
      id: timbers_state
      entity_id: ${timbers_tracker_entity}
    - <<: *timbers_tracker
      id: timbers_season
      attribute: season
    - <<: *timbers_tracker
      id: timbers_logo
      attribute: ${team_logo_attribute}
    - <<: *timbers_tracker
      id: timbers_opponent_logo
      attribute: ${opponent_logo_attribute}
    - <<: *timbers_tracker
      id: timbers_team_colors
      attribute: ${team_colors_attribute}
    - <<: *timbers_tracker
      id: timbers_opponent_colors
      attribute: ${opponent_colors_attribute}
    - <<: *timbers_tracker
      id: timbers_next_game_datetime
      attribute: ${next_game_datetime_attribute}
    - <<: *timbers_tracker
      id: timbers_team_score
      attribute: ${team_score_attribute}
    - <<: *timbers_tracker
      id: timbers_opponent_score
      attribute: ${opponent_score_attribute}
  # Hurricanes
    - &hurricanes_tracker
      platform: homeassistant
      id: hurricanes_state
      entity_id: ${hurricanes_tracker_entity}
    - <<: *hurricanes_tracker
      id: hurricanes_season
      attribute: season
    - <<: *hurricanes_tracker
      id: hurricanes_logo
      attribute: ${team_logo_attribute}
    - <<: *hurricanes_tracker
      id: hurricanes_opponent_logo
      attribute: ${opponent_logo_attribute}
    - <<: *hurricanes_tracker
      id: hurricanes_team_colors
      attribute: ${team_colors_attribute}
    - <<: *hurricanes_tracker
      id: hurricanes_opponent_colors
      attribute: ${opponent_colors_attribute}
    - <<: *hurricanes_tracker
      id: hurricanes_next_game_datetime
      attribute: ${next_game_datetime_attribute}
    - <<: *hurricanes_tracker
      id: hurricanes_team_score
      attribute: ${team_score_attribute}
    - <<: *hurricanes_tracker
      id: hurricanes_opponent_score
      attribute: ${opponent_score_attribute}
  # Rangers
    - &rangers_tracker
      platform: homeassistant
      id: rangers_state
      entity_id: ${rangers_tracker_entity}
    - <<: *rangers_tracker
      id: rangers_season
      attribute: season
    - <<: *rangers_tracker
      id: rangers_logo
      attribute: ${team_logo_attribute}
    - <<: *rangers_tracker
      id: rangers_opponent_logo
      attribute: ${opponent_logo_attribute}
    - <<: *rangers_tracker
      id: rangers_team_colors
      attribute: ${team_colors_attribute}
    - <<: *rangers_tracker
      id: rangers_opponent_colors
      attribute: ${opponent_colors_attribute}
    - <<: *rangers_tracker
      id: rangers_next_game_datetime
      attribute: ${next_game_datetime_attribute}
    - <<: *rangers_tracker
      id: rangers_team_score
      attribute: ${team_score_attribute}
    - <<: *rangers_tracker
      id: rangers_opponent_score
      attribute: ${opponent_score_attribute}
  # Avalanche
    - &avalanche_tracker
      platform: homeassistant
      id: avalanche_state
      entity_id: ${avalanche_tracker_entity}
    - <<: *avalanche_tracker
      id: avalanche_season
      attribute: season
    - <<: *avalanche_tracker
      id: avalanche_logo
      attribute: ${team_logo_attribute}
    - <<: *avalanche_tracker
      id: avalanche_opponent_logo
      attribute: ${opponent_logo_attribute}
    - <<: *avalanche_tracker
      id: avalanche_team_colors
      attribute: ${team_colors_attribute}
    - <<: *avalanche_tracker
      id: avalanche_opponent_colors
      attribute: ${opponent_colors_attribute}
    - <<: *avalanche_tracker
      id: avalanche_next_game_datetime
      attribute: ${next_game_datetime_attribute}
    - <<: *avalanche_tracker
      id: avalanche_team_score
      attribute: ${team_score_attribute}
    - <<: *avalanche_tracker
      id: avalanche_opponent_score
      attribute: ${opponent_score_attribute}
  # Canadiens
    - &canadiens_tracker
      platform: homeassistant
      id: canadiens_state
      entity_id: ${canadiens_tracker_entity}
    - <<: *canadiens_tracker
      id: canadiens_season
      attribute: season
    - <<: *canadiens_tracker
      id: canadiens_logo
      attribute: ${team_logo_attribute}
    - <<: *canadiens_tracker
      id: canadiens_opponent_logo
      attribute: ${opponent_logo_attribute}
    - <<: *canadiens_tracker
      id: canadiens_team_colors
      attribute: ${team_colors_attribute}
    - <<: *canadiens_tracker
      id: canadiens_opponent_colors
      attribute: ${opponent_colors_attribute}
    - <<: *canadiens_tracker
      id: canadiens_next_game_datetime
      attribute: ${next_game_datetime_attribute}
    - <<: *canadiens_tracker
      id: canadiens_team_score
      attribute: ${team_score_attribute}
    - <<: *canadiens_tracker
      id: canadiens_opponent_score
      attribute: ${opponent_score_attribute}

  # create template sensors to display the current logo and score on the scoreboard
    - platform: template
      name: "Displayed Team"
      id: displayed_team
      icon: "mdi:format-list-bulleted"
    # display whats currently on the scoreboard
    - platform: template
      name: "Displayed Score"
      id: displayed_score
      icon: "mdi:format-list-bulleted"

select:
  - platform: template
    id: logo_source
    name: Logo Source
    optimistic: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "Portland Timbers"
      - "Carolina Hurricanes"
      - "New York Rangers"
      - "Colorado Avalanche"
      - "Montreal Canadiens"
    set_action:
      - lambda: |-
          id(selected_team) = x;

      
font:
  - file: "gfonts://Press+Start+2P"
    id: score_font
    size: 8

      
script:
  - id: auto_team_select
    mode: restart
    then:
      #this script determines which team logo (if any) should be displayed based on the selected source and the current game states, and updates the displayed_team global variable accordingly.
      # this script will only be called when the selected_team global variable is set to "Auto", so we will only check for teams that are currently in a game or have a game coming up.
      - lambda: |-
          # use the selected_team global variable to determine which team logo to display. 
          # we will prioritize 
            # 1) any team currently in a postseason game ({team}_state == "IN" && {team}_season == "post-season")
            # 2) any team currently in a game ({team}_state == "IN")
            # 3) the next game for any team that is not currently in a game (use the {team}_next_game_datetime attribute to determine which team has the next game)

          # variable to hold the team to display, if it is not set, we keep searching for a team to display.
          std::string selected_team; 

          # check for any team currently in a postseason game, using 
          if (id(timbers_state).state == "IN" && id(timbers_season).state == "post-season") {
            selected_team = "Portland Timbers";
          } else if (id(hurricanes_state).state == "IN" && id(hurricanes_season).state == "post-season") {
            selected_team = "Carolina Hurricanes";
          } else if (id(rangers_state).state == "IN" && id(rangers_season).state == "post-season") {
            selected_team = "New York Rangers";
          } else if (id(avalanche_state).state == "IN" && id(avalanche_season).state == "post-season") {
            selected_team = "Colorado Avalanche";
          } else if (id(canadiens_state).state == "IN" && id(canadiens_season).state == "post-season") {
            selected_team = "Montreal Canadiens";
          }

          # if no team is currently in a postseason game, check for any team currently in a game
          if (selected_team.empty()) {
            if (id(timbers_state).state == "IN") {
              selected_team = "Portland Timbers";
            } else if (id(hurricanes_state).state == "IN") {
              selected_team = "Carolina Hurricanes";
            } else if (id(rangers_state).state == "IN") {
              selected_team = "New York Rangers";
            } else if (id(avalanche_state).state == "IN") {
              selected_team = "Colorado Avalanche";
            } else if (id(canadiens_state).state == "IN") {
              selected_team = "Montreal Canadiens";
            }
          }

          # if no team is currently in a game, check for the next game for all teams and select the team with the earliest next game datetime.
          if (selected_team.empty()) {
            std::string next_game_team;
            std::string next_game_datetime;

            if (!id(timbers_next_game_datetime).state.empty()) {
              next_game_team = "Portland Timbers";
              next_game_datetime = id(timbers_next_game_datetime).state;
            }
            if (!id(hurricanes_next_game_datetime).state.empty()) {
              if (next_game_datetime.empty() || id(hurricanes_next_game_datetime).state < next_game_datetime) {
                next_game_team = "Carolina Hurricanes";
                next_game_datetime = id(hurricanes_next_game_datetime).state;
              }
            }
            if (!id(rangers_next_game_datetime).state.empty()) {
              if (next_game_datetime.empty() || id(rangers_next_game_datetime).state < next_game_datetime) {
                next_game_team = "New York Rangers";
                next_game_datetime = id(rangers_next_game_datetime).state;
              }
            }
            if (!id(avalanche_next_game_datetime).state.empty()) {
              if (next_game_datetime.empty() || id(avalanche_next_game_datetime).state < next_game_datetime) {
                next_game_team = "Colorado Avalanche";
                next_game_datetime = id(avalanche_next_game_datetime).state;
              }
            }
            if (!id(canadiens_next_game_datetime).state.empty()) {
              if (next_game_datetime.empty() || id(canadiens_next_game_datetime).state < next_game_datetime) {
                next_game_team = "Montreal Canadiens";
                next_game_datetime = id(canadiens_next_game_datetime).state;
              }
            }

            selected_team = next_game_team;
          }

          # if we have a team to display, update the displayed_team global variable
          if (!selected_team.empty()) {
            # check if the selected_team is different from the currently displayed_team, if so, update the displayed_team global variable
            if (id(displayed_team) != selected_team) {
              id(displayed_team) = selected_team;
              # call update_displayed_values script to update the displayed values for the selected team
              id(update_displayed_values).execute();
            }
          } else {
            id(displayed_team) = "None";
          }
# update displayed_state, displayed_season, displayed_logo, displayed_opponent_logo, displayed_team_colors, displayed_opponent_colors, displayed_next_game_datetime, displayed_team_score, displayed_opponent_score when displayed_team changes, so we can use these values to update the display.
  - id: update_displayed_values
    mode: restart
    then:
      - lambda: |-
          if (id(displayed_team) == "Portland Timbers") {
            id(displayed_state) = id(timbers_state).state;
            id(displayed_season) = id(timbers_season).state;
            id(displayed_logo) = id(timbers_logo).state;
            id(displayed_opponent_logo) = id(timbers_opponent_logo).state;
            id(displayed_team_colors) = id(timbers_team_colors).state;
            id(displayed_opponent_colors) = id(timbers_opponent_colors).state;
            id(displayed_next_game_datetime) = id(timbers_next_game_datetime).state;
            id(displayed_team_score) = id(timbers_team_score).state;
            id(displayed_opponent_score) = id(timbers_opponent_score).state;
          } else if (id(displayed_team) == "Carolina Hurricanes") {
            id(displayed_state) = id(hurricanes_state).state;
            id(displayed_season) = id(hurricanes_season).state;
            id(displayed_logo) = id(hurricanes_logo).state;
            id(displayed_opponent_logo) = id(hurricanes_opponent_logo).state;
            id(displayed_team_colors) = id(hurricanes_team_colors).state;
            id(displayed_opponent_colors) = id(hurricanes_opponent_colors).state;
            id(displayed_next_game_datetime) = id(hurricanes_next_game_datetime).state;
            id(displayed_team_score) = id(hurricanes_team_score).state;
            id(displayed_opponent_score) = id(hurricanes_opponent_score).state;
          } else if (id(displayed_team) == "New York Rangers") {
            id(displayed_state) = id(rangers_state).state;
            id(displayed_season) = id(rangers_season).state;
            id(displayed_logo) = id(rangers_logo).state;
            id(displayed_opponent_logo) = id(rangers_opponent_logo).state;
            id(displayed_team_colors) = id(rangers_team_colors).state;
            id(displayed_opponent_colors) = id(rangers_opponent_colors).state;
            id(displayed_next_game_datetime) = id(rangers_next_game_datetime).state;
            id(displayed_team_score) = id(rangers_team_score).state;
            id(displayed_opponent_score) = id(rangers_opponent_score).state;
          } else if (id(displayed_team) == "Colorado Avalanche") {
            id(displayed_state) = id(avalanche_state).state;
            id(displayed_season) = id(avalanche_season).state;
            id(displayed_logo) = id(avalanche_logo).state;
            id(displayed_opponent_logo) = id(avalanche_opponent_logo).state;
            id(displayed_team_colors) = id(avalanche_team_colors).state;
            id(displayed_opponent_colors) = id(avalanche_opponent_colors).state;
            id(displayed_next_game_datetime) = id(avalanche_next_game_datetime).state;
            id(displayed_team_score) = id(avalanche_team_score).state;
            id(displayed_opponent_score) = id(avalanche_opponent_score).state;
          } else if (id(displayed_team) == "Montreal Canadiens") {
            id(displayed_state) = id(canadiens_state).state;
            id(displayed_season) = id(canadiens_season).state;
            id(displayed_logo) = id(canadiens_logo).state;
            id(displayed_opponent_logo) = id(canadiens_opponent_logo).state;
            id(displayed_team_colors) = id(canadiens_team_colors).state;
            id(displayed_opponent_colors) = id(canadiens_opponent_colors).state;
            id(displayed_next_game_datetime) = id(canadiens_next_game_datetime).state;
            id(displayed_team_score) = id(canadiens_team_score).state;
            id(displayed_opponent_score) = id(canadiens_opponent_score).state;
          } else {
            // if no team is selected, clear the displayed values
            id(displayed_state) = "";
            id(displayed_season) = "";
            id(displayed_logo) = "";
            id(displayed_opponent_logo) = "";
            id(displayed_team_colors) = "";
            id(displayed_opponent_colors) = "";
            id(displayed_next_game_datetime) = "";
            id(displayed_team_score) = "";
            id(displayed_opponent_score) = "";
          }


