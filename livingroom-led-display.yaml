# this yaml is for the living room LED display using ESPHome on home assistant. 
# it is connected to four 8x32 panels arranged as a 32x32 grid.
# the goal is to have this display the logo of the current sports team playing via the team tracker integration
substitutions:
  panel_data_pin: GPIO2
  matrix_width: "32"
  matrix_height: "32"
  # Attribute containing the current game's team logo URL.
  team_logo_attribute: team_logo
  timbers_tracker_entity: sensor.mls_portland_timbers
  hurricanes_tracker_entity: sensor.nhl_carolina_hurricanes
  rangers_tracker_entity: sensor.nhl_new_york_rangers
  avalanche_tracker_entity: sensor.nhl_colorado_avalanche
  canadiens_tracker_entity: sensor.nhl_montreal_canadiens

esphome:
  name: "livingroom-led-display"
  friendly_name: livingroom_led_display
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: select_team_logo

http_request:

globals:
  - id: selected_team_logo_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: last_team_logo_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: selected_logo_source
    type: std::string
    restore_value: yes
    initial_value: '"Auto"'
  - id: requested_logo_source
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: timbers_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "false"
  - id: hurricanes_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "false"
  - id: rangers_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "false"
  - id: avalanche_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "false"
  - id: canadiens_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "false"

select:
  - platform: template
    id: logo_source
    name: Logo Source
    optimistic: true
    initial_option: Auto
    options:
      - "Auto"
      - "Off"
      - "Portland Timbers"
      - "Carolina Hurricanes"
      - "New York Rangers"
      - "Colorado Avalanche"
      - "Montreal Canadiens"
    set_action:
      - lambda: |-
          id(selected_logo_source) = x;
      - script.execute: select_team_logo

script:
  - id: select_team_logo
    mode: restart
    then:
      - lambda: |-
          std::string selected_url;
          std::string selected_team;

          if (id(selected_logo_source) == "Off") {
            id(selected_team_logo_url).clear();
            id(requested_logo_source) = "";
            return;
          }

          auto select_if_present = [&](const std::string &name, const std::string &url) {
            if (selected_url.empty() && !url.empty()) {
              selected_url = url;
              selected_team = name;
            }
          };

          if (id(selected_logo_source) == "Portland Timbers") {
            select_if_present("timbers", id(timbers_logo).state);
          } else if (id(selected_logo_source) == "Carolina Hurricanes") {
            select_if_present("hurricanes", id(hurricanes_logo).state);
          } else if (id(selected_logo_source) == "New York Rangers") {
            select_if_present("rangers", id(rangers_logo).state);
          } else if (id(selected_logo_source) == "Colorado Avalanche") {
            select_if_present("avalanche", id(avalanche_logo).state);
          } else if (id(selected_logo_source) == "Montreal Canadiens") {
            select_if_present("canadiens", id(canadiens_logo).state);
          }

          auto is_active_game = [](const std::string &state) {
            return !state.empty() && state != "PRE" && state != "POST" && state != "FINAL";
          };

          auto try_active = [&](const std::string &state, const std::string &url, const std::string &team) {
            if (selected_url.empty() && is_active_game(state) && !url.empty()) {
              selected_url = url;
              selected_team = team;
            }
          };

          auto try_postseason_pre = [&](const std::string &state, const std::string &season, const std::string &url, const std::string &team) {
            if (selected_url.empty() && state == "PRE" && season == "post-season" && !url.empty()) {
              selected_url = url;
              selected_team = team;
            }
          };

          auto try_pre = [&](const std::string &state, const std::string &url, const std::string &team) {
            if (selected_url.empty() && state == "PRE" && !url.empty()) {
              selected_url = url;
              selected_team = team;
            }
          };

          if (id(selected_logo_source) == "Auto") {
            try_active(id(timbers_state).state, id(timbers_logo).state, "timbers");
            try_active(id(hurricanes_state).state, id(hurricanes_logo).state, "hurricanes");
            try_active(id(rangers_state).state, id(rangers_logo).state, "rangers");
            try_active(id(avalanche_state).state, id(avalanche_logo).state, "avalanche");
            try_active(id(canadiens_state).state, id(canadiens_logo).state, "canadiens");

            if (selected_url.empty()) {
              try_postseason_pre(id(timbers_state).state, id(timbers_season).state, id(timbers_logo).state, "timbers");
              try_postseason_pre(id(hurricanes_state).state, id(hurricanes_season).state, id(hurricanes_logo).state, "hurricanes");
              try_postseason_pre(id(rangers_state).state, id(rangers_season).state, id(rangers_logo).state, "rangers");
              try_postseason_pre(id(avalanche_state).state, id(avalanche_season).state, id(avalanche_logo).state, "avalanche");
              try_postseason_pre(id(canadiens_state).state, id(canadiens_season).state, id(canadiens_logo).state, "canadiens");
            }

            if (selected_url.empty()) {
              try_pre(id(timbers_state).state, id(timbers_logo).state, "timbers");
              try_pre(id(hurricanes_state).state, id(hurricanes_logo).state, "hurricanes");
              try_pre(id(rangers_state).state, id(rangers_logo).state, "rangers");
              try_pre(id(avalanche_state).state, id(avalanche_logo).state, "avalanche");
              try_pre(id(canadiens_state).state, id(canadiens_logo).state, "canadiens");
            }
          }

          id(selected_team_logo_url) = selected_url;
          id(requested_logo_source) = selected_team;

      - if:
          condition:
            lambda: |-
              return !id(selected_team_logo_url).empty() &&
                     (id(selected_team_logo_url).rfind("http://", 0) == 0 ||
                      id(selected_team_logo_url).rfind("https://", 0) == 0) &&
                     id(selected_team_logo_url) != id(last_team_logo_url);
          then:
            - lambda: |-
                id(last_team_logo_url) = id(selected_team_logo_url);
            - online_image.set_url:
                id: team_logo
                url: !lambda |-
                  return id(selected_team_logo_url);
                update: true
      - if:
          condition:
            lambda: |-
              return id(selected_team_logo_url).empty();
          then:
            - component.update: led_matrix_display

text_sensor:
  - platform: homeassistant
    id: timbers_state
    entity_id: ${timbers_tracker_entity}
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: timbers_season
    entity_id: ${timbers_tracker_entity}
    attribute: season
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: timbers_logo
    entity_id: ${timbers_tracker_entity}
    attribute: ${team_logo_attribute}
    on_value:
      then:
        - script.execute: select_team_logo

  - platform: homeassistant
    id: hurricanes_state
    entity_id: ${hurricanes_tracker_entity}
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: hurricanes_season
    entity_id: ${hurricanes_tracker_entity}
    attribute: season
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: hurricanes_logo
    entity_id: ${hurricanes_tracker_entity}
    attribute: ${team_logo_attribute}
    on_value:
      then:
        - script.execute: select_team_logo

  - platform: homeassistant
    id: rangers_state
    entity_id: ${rangers_tracker_entity}
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: rangers_season
    entity_id: ${rangers_tracker_entity}
    attribute: season
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: rangers_logo
    entity_id: ${rangers_tracker_entity}
    attribute: ${team_logo_attribute}
    on_value:
      then:
        - script.execute: select_team_logo

  - platform: homeassistant
    id: avalanche_state
    entity_id: ${avalanche_tracker_entity}
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: avalanche_season
    entity_id: ${avalanche_tracker_entity}
    attribute: season
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: avalanche_logo
    entity_id: ${avalanche_tracker_entity}
    attribute: ${team_logo_attribute}
    on_value:
      then:
        - script.execute: select_team_logo

  - platform: homeassistant
    id: canadiens_state
    entity_id: ${canadiens_tracker_entity}
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: canadiens_season
    entity_id: ${canadiens_tracker_entity}
    attribute: season
    on_value:
      then:
        - script.execute: select_team_logo
  - platform: homeassistant
    id: canadiens_logo
    entity_id: ${canadiens_tracker_entity}
    attribute: ${team_logo_attribute}
    on_value:
      then:
        - script.execute: select_team_logo

  - platform: template
    id: downloaded_logos
    name: Downloaded Logos
    update_interval: never
    lambda: |-
      std::string value = "";
      if (id(timbers_logo_downloaded)) value += "Portland Timbers, ";
      if (id(hurricanes_logo_downloaded)) value += "Carolina Hurricanes, ";
      if (id(rangers_logo_downloaded)) value += "New York Rangers, ";
      if (id(avalanche_logo_downloaded)) value += "Colorado Avalanche, ";
      if (id(canadiens_logo_downloaded)) value += "Montreal Canadiens, ";
      if (value.empty()) return std::string("none");
      value.resize(value.size() - 2);
      return value;

online_image:
  - url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/No_image_available.svg/64px-No_image_available.svg.png"
    id: team_logo
    format: PNG
    resize: 32x32
    type: RGB565
    update_interval: never
    on_download_finished:
      - lambda: |-
          if (id(requested_logo_source) == "timbers") id(timbers_logo_downloaded) = true;
          if (id(requested_logo_source) == "hurricanes") id(hurricanes_logo_downloaded) = true;
          if (id(requested_logo_source) == "rangers") id(rangers_logo_downloaded) = true;
          if (id(requested_logo_source) == "avalanche") id(avalanche_logo_downloaded) = true;
          if (id(requested_logo_source) == "canadiens") id(canadiens_logo_downloaded) = true;
      - component.update: led_matrix_display
      - component.update: downloaded_logos
      on_error:
        - lambda: |-
          id(selected_team_logo_url).clear();
          id(last_team_logo_url).clear();
        - component.update: led_matrix_display

light:
  - platform: esp32_rmt_led_strip
    id: panel_leds
    pin: ${panel_data_pin}
    chipset: ws2812
    rgb_order: GRB
    num_leds: 1024
    name: "Living Room LED Matrix"
    restore_mode: ALWAYS_OFF

display:
  - platform: addressable_light
    id: led_matrix_display
    addressable_light_id: panel_leds
    width: ${matrix_width}
    height: ${matrix_height}
    update_interval: 1s
    pixel_mapper: |-
      // Four 8x32 panels stacked top-to-bottom into one 32x32 matrix.
      // Panel mapping matches the diagram: data enters on the right side,
      // columns run right-to-left, and each column snakes top/bottom.
      const int panel = y / 8;
      const int local_y = y % 8;
      const int panel_base = panel * 256;
      const int col_from_right = 31 - x;
      if ((col_from_right % 2) == 0) {
        return panel_base + (col_from_right * 8) + (7 - local_y);
      }
      return panel_base + (col_from_right * 8) + local_y;
    lambda: |-
      it.fill(Color::BLACK);
      if (id(selected_logo_source) == "Off") {
        return;
      }
      it.image(0, 0, id(team_logo));
