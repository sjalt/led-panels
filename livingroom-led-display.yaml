font:
  - file: "gfonts://VT323"
    id: score_font
    size: 8



# Pre-load the team logos as images in ESPHome so they can be displayed on the LED matrix without needing to download them at runtime.
image:
  - file: ${logo_base_path}/timbers.png
    id: timbers_logo_image
    resize: 32x32
    type: RGB565
  - file: ${logo_base_path}/canes.png
    id: hurricanes_logo_image
    resize: 32x32
    type: RGB565
  - file: ${logo_base_path}/rangers.png
    id: rangers_logo_image
    resize: 32x32
    type: RGB565
  - file: ${logo_base_path}/avalanche.png
    id: avalanche_logo_image
    resize: 32x32
    type: RGB565
  - file: ${logo_base_path}/canadiens.png
    id: canadiens_logo_image
    resize: 32x32
    type: RGB565
  - file: ${logo_base_path}/blank.png
    id: blank_logo_image
    resize: 32x32
    type: RGB565

light:
  - platform: esp32_rmt_led_strip
    id: panel_leds
    pin: ${panel_data_pin}
    chipset: ws2812
    rgb_order: GRB
    num_leds: 1280
    name: "Living Room LED Panels"
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s

display:
  - platform: addressable_light
    id: led_matrix_display
    addressable_light_id: panel_leds
    width: ${matrix_width}
    height: ${matrix_height}
    update_interval: 250ms
    pixel_mapper: |-
      // Four 8x32 panels stacked top-to-bottom into one 32x32 matrix.
      // Base mapping for each panel: data enters on the right side,
      // columns run right-to-left, and each column snakes top/bottom.
      // Odd panels are physically rotated 180 degrees.
      const int panel = y / 8;
      const int local_y = y % 8;
      const int panel_base = panel * 256;
      int mapped_x = x;
      int mapped_y = local_y;

      if ((panel % 2) == 1) {
        mapped_x = 31 - x;
        mapped_y = 7 - local_y;
      }

      const int col_from_right = 31 - mapped_x;
      if ((col_from_right % 2) == 0) {
        return panel_base + (col_from_right * 8) + (7 - mapped_y);
      }
      return panel_base + (col_from_right * 8) + mapped_y;
    lambda: |-
      it.fill(Color::BLACK);
      if (id(needs_blank_frame)) {
        id(needs_blank_frame) = false;
        return;
      }

      if (id(flash_red_active)) {
        if (id(flash_red_show_red)) {
          // Show full red at the pixel level, then alternate back to the logo next frame.
          it.fill(Color(255, 0, 0));
          id(flash_red_show_red) = false;
          return;
        }
        id(flash_red_show_red) = true;
      }

      if (id(current_logo_key) == "off") {
        return;
      }
      if (id(current_logo_key) == "timbers") {
        it.image(0, 0, id(timbers_logo_image));
      } else if (id(current_logo_key) == "hurricanes") {
        it.image(0, 0, id(hurricanes_logo_image));
      } else if (id(current_logo_key) == "rangers") {
        it.image(0, 0, id(rangers_logo_image));
      } else if (id(current_logo_key) == "avalanche") {
        it.image(0, 0, id(avalanche_logo_image));
      } else if (id(current_logo_key) == "canadiens") {
        it.image(0, 0, id(canadiens_logo_image));
      } else {
        it.image(0, 0, id(blank_logo_image));
      }

  - platform: addressable_light
    id: score_matrix_display
    addressable_light_id: panel_leds
    width: ${score_panel_width}
    height: ${score_panel_height}
    update_interval: 120ms
    pixel_mapper: |-
      // Separate 8x32 panel chained after the 32x32 matrix LEDs.
      // This panel uses the same right-to-left serpentine column layout.
      const int col_from_right = 31 - x;
      if ((col_from_right % 2) == 0) {
        return 1024 + (col_from_right * 8) + (7 - y);
      }
      return 1024 + (col_from_right * 8) + y;
    lambda: |-
      it.fill(Color::BLACK);

      auto publish_displayed_score = [&](const std::string &value) {
        if (id(last_displayed_score_text) != value) {
          id(last_displayed_score_text) = value;
          id(displayed_score).publish_state(value);
        }
      };

      if (id(current_logo_key) == "off" || id(current_logo_key) == "blank") {
        publish_displayed_score("");
        return;
      }

      std::string tracker_state;
      std::string team_colors_attr;
      std::string opponent_colors_attr;
      std::string next_game_datetime;
      int team_score = 0;
      int opponent_score = 0;
      bool has_team_score = false;
      bool has_opponent_score = false;

      if (id(current_logo_key) == "timbers") {
        tracker_state = id(timbers_state).state;
        team_colors_attr = id(timbers_team_colors).state;
        opponent_colors_attr = id(timbers_opponent_colors).state;
        next_game_datetime = id(timbers_next_game_datetime).state;
        if (id(timbers_team_score).has_state() && id(timbers_team_score).state != "None") {
          team_score = atoi(id(timbers_team_score).state.c_str());
          has_team_score = true;
        }
        if (id(timbers_opponent_score).has_state() && id(timbers_opponent_score).state != "None") {
          opponent_score = atoi(id(timbers_opponent_score).state.c_str());
          has_opponent_score = true;
        }
      } else if (id(current_logo_key) == "hurricanes") {
        tracker_state = id(hurricanes_state).state;
        team_colors_attr = id(hurricanes_team_colors).state;
        opponent_colors_attr = id(hurricanes_opponent_colors).state;
        next_game_datetime = id(hurricanes_next_game_datetime).state;
        if (id(hurricanes_team_score).has_state() && id(hurricanes_team_score).state != "None") {
          team_score = atoi(id(hurricanes_team_score).state.c_str());
          has_team_score = true;
        }
        if (id(hurricanes_opponent_score).has_state() && id(hurricanes_opponent_score).state != "None") {
          opponent_score = atoi(id(hurricanes_opponent_score).state.c_str());
          has_opponent_score = true;
        }
      } else if (id(current_logo_key) == "rangers") {
        tracker_state = id(rangers_state).state;
        team_colors_attr = id(rangers_team_colors).state;
        opponent_colors_attr = id(rangers_opponent_colors).state;
        next_game_datetime = id(rangers_next_game_datetime).state;
        if (id(rangers_team_score).has_state() && id(rangers_team_score).state != "None") {
          team_score = atoi(id(rangers_team_score).state.c_str());
          has_team_score = true;
        }
        if (id(rangers_opponent_score).has_state() && id(rangers_opponent_score).state != "None") {
          opponent_score = atoi(id(rangers_opponent_score).state.c_str());
          has_opponent_score = true;
        }
      } else if (id(current_logo_key) == "avalanche") {
        tracker_state = id(avalanche_state).state;
        team_colors_attr = id(avalanche_team_colors).state;
        opponent_colors_attr = id(avalanche_opponent_colors).state;
        next_game_datetime = id(avalanche_next_game_datetime).state;
        if (id(avalanche_team_score).has_state() && id(avalanche_team_score).state != "None") {
          team_score = atoi(id(avalanche_team_score).state.c_str());
          has_team_score = true;
        }
        if (id(avalanche_opponent_score).has_state() && id(avalanche_opponent_score).state != "None") {
          opponent_score = atoi(id(avalanche_opponent_score).state.c_str());
          has_opponent_score = true;
        }
      } else if (id(current_logo_key) == "canadiens") {
        tracker_state = id(canadiens_state).state;
        team_colors_attr = id(canadiens_team_colors).state;
        opponent_colors_attr = id(canadiens_opponent_colors).state;
        next_game_datetime = id(canadiens_next_game_datetime).state;
        if (id(canadiens_team_score).has_state() && id(canadiens_team_score).state != "None") {
          team_score = atoi(id(canadiens_team_score).state.c_str());
          has_team_score = true;
        }
        if (id(canadiens_opponent_score).has_state() && id(canadiens_opponent_score).state != "None") {
          opponent_score = atoi(id(canadiens_opponent_score).state.c_str());
          has_opponent_score = true;
        }
      } else {
        publish_displayed_score("");
        return;
      }

      if (tracker_state == "NOT_FOUND") {
        publish_displayed_score("");
        return;
      }

      auto parse_primary_color = [](const std::string &raw, Color fallback) {
        for (size_t i = 0; i + 6 < raw.size(); i++) {
          if (raw[i] != '#') {
            continue;
          }
          bool all_hex = true;
          for (size_t j = i + 1; j < i + 7; j++) {
            const char c = raw[j];
            const bool is_hex = ((c >= '0' && c <= '9') || (c >= 'a' && c <= 'f') || (c >= 'A' && c <= 'F'));
            if (!is_hex) {
              all_hex = false;
              break;
            }
          }
          if (!all_hex) {
            continue;
          }

          const std::string rr = raw.substr(i + 1, 2);
          const std::string gg = raw.substr(i + 3, 2);
          const std::string bb = raw.substr(i + 5, 2);
          const int r = (int) strtol(rr.c_str(), nullptr, 16);
          const int g = (int) strtol(gg.c_str(), nullptr, 16);
          const int b = (int) strtol(bb.c_str(), nullptr, 16);
          return Color(r, g, b);
        }
        return fallback;
      };

      auto is_digit = [](char c) {
        return c >= '0' && c <= '9';
      };

      auto two_digit = [](int value) {
        if (value < 10) {
          return std::string("0") + std::to_string(value);
        }
        return std::to_string(value);
      };

      auto is_leap_year = [](int year) {
        if ((year % 400) == 0) {
          return true;
        }
        if ((year % 100) == 0) {
          return false;
        }
        return (year % 4) == 0;
      };

      auto days_in_month = [&](int year, int month) {
        static const int month_lengths[12] = {31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31};
        int days = month_lengths[month - 1];
        if (month == 2 && is_leap_year(year)) {
          days = 29;
        }
        return days;
      };

      auto format_utc_to_pdt = [&](const std::string &raw) {
        // Expected input: YYYY-MM-DDTHH:MMZ
        if (raw.size() < 16) {
          return raw;
        }
        if (raw[4] != '-' || raw[7] != '-' || raw[10] != 'T' || raw[13] != ':') {
          return raw;
        }

        const int digit_positions[] = {0, 1, 2, 3, 5, 6, 8, 9, 11, 12, 14, 15};
        for (int idx : digit_positions) {
          if (!is_digit(raw[idx])) {
            return raw;
          }
        }

        int year = atoi(raw.substr(0, 4).c_str());
        int month = atoi(raw.substr(5, 2).c_str());
        int day = atoi(raw.substr(8, 2).c_str());
        int hour = atoi(raw.substr(11, 2).c_str());
        const int minute = atoi(raw.substr(14, 2).c_str());

        if (month < 1 || month > 12 || hour < 0 || hour > 23 || minute < 0 || minute > 59) {
          return raw;
        }
        if (day < 1 || day > days_in_month(year, month)) {
          return raw;
        }

        // User requested PDT display, so apply a fixed UTC-7 offset.
        hour -= 7;
        while (hour < 0) {
          hour += 24;
          day -= 1;
          if (day < 1) {
            month -= 1;
            if (month < 1) {
              month = 12;
              year -= 1;
            }
            day = days_in_month(year, month);
          }
        }

        const bool is_pm = hour >= 12;
        int hour_12 = hour % 12;
        if (hour_12 == 0) {
          hour_12 = 12;
        }

        const std::string am_pm = is_pm ? "PM" : "AM";
        const int year_short = year % 100;
        return std::to_string(month) + "/" + std::to_string(day) + "/" + two_digit(year_short) + " " + two_digit(hour_12) + ":" + two_digit(minute) + " " + am_pm;
      };

      if (tracker_state == "PRE") {
        std::string scroll_text = next_game_datetime.empty() ? next_game_datetime : format_utc_to_pdt(next_game_datetime);
        if (scroll_text.empty()) {
          scroll_text = "NEXT GAME";
        }

        if (scroll_text != id(score_scroll_message)) {
          id(score_scroll_message) = scroll_text;
          int x1 = 0;
          int y1 = 0;
          int width = 0;
          int height = 0;
          it.get_text_bounds(0, 0, scroll_text.c_str(), id(score_font), TextAlign::TOP_LEFT, &x1, &y1, &width, &height);
          id(score_scroll_x) = -width;
        }

        int x1 = 0;
        int y1 = 0;
        int width = 0;
        int height = 0;
        it.get_text_bounds(0, 0, id(score_scroll_message).c_str(), id(score_font), TextAlign::TOP_LEFT, &x1, &y1, &width, &height);

        it.print(id(score_scroll_x), 0, id(score_font), Color(200, 200, 200), TextAlign::TOP_LEFT, id(score_scroll_message).c_str());
        id(score_scroll_x) += 1;
        if (id(score_scroll_x) > ${score_panel_width}) {
          id(score_scroll_x) = -width;
        }
        publish_displayed_score(scroll_text);
        return;
      }

      id(score_scroll_message) = "";
      id(score_scroll_x) = 0;

      const Color team_color = parse_primary_color(team_colors_attr, Color::WHITE);
      const Color opponent_color = parse_primary_color(opponent_colors_attr, Color(140, 140, 140));
      const std::string team_score_text = has_team_score ? std::to_string(team_score) : "--";
      const std::string opponent_score_text = has_opponent_score ? std::to_string(opponent_score) : "--";

      // Team score on the left, opponent score on the right.
      it.print(2, 0, id(score_font), team_color, TextAlign::TOP_LEFT, team_score_text.c_str());
      it.print(20, 0, id(score_font), opponent_color, TextAlign::TOP_LEFT, opponent_score_text.c_str());

      // Publish the displayed score as a text sensor in Home Assistant for use in automations or dashboards.
      std::string displayed_score_text = team_score_text + " - " + opponent_score_text;
      publish_displayed_score(displayed_score_text);
