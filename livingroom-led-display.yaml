# this yaml is for the living room LED display using ESPHome on home assistant. 
# it is connected to four 8x32 panels arranged as a 32x32 grid.
# the goal is to have this display the logo of the current sports team playing via the team tracker integration
substitutions:
  panel_data_pin: GPIO2
  score_data_pin: GPIO4
  matrix_width: "32"
  matrix_height: "32"
  score_panel_width: "32"
  score_panel_height: "8"
  # Use a path inside /config so ESPHome can access files during compile.
  logo_base_path: /config/esphome/logos
  # Attribute containing the current game's team logo URL.
  team_logo_attribute: team_logo
  team_score_attribute: team_score
  opponent_score_attribute: opponent_score
  team_colors_attribute: team_colors
  opponent_colors_attribute: opponent_colors
  next_game_datetime_attribute: date
  timbers_tracker_entity: sensor.mls_portland_timbers
  hurricanes_tracker_entity: sensor.nhl_carolina_hurricanes
  rangers_tracker_entity: sensor.nhl_new_york_rangers
  avalanche_tracker_entity: sensor.nhl_colorado_avalanche
  canadiens_tracker_entity: sensor.nhl_montreal_canadiens

  room_brightness_sensor: sensor.living_room_occupancy_illuminance

esphome:
  name: "livingroom-led-display"
  friendly_name: livingroom_led_display
  min_version: 2026.4.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - lambda: |-
          auto call = id(panel_leds).turn_on();
          //call.set_brightness(id(matrix_brightness_percent));
          call.perform();

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: select_team_logo

interval:
  - interval: 15min
    then:
      - script.execute: select_team_logo
  - interval: 250ms
    then:
      - if:
          condition:
            lambda: |-
              return id(flash_red_active);
          then:
            - lambda: |-
                id(flash_red_show_red) = !id(flash_red_show_red);
            - component.update: led_matrix_display

globals:
  - id: last_team_logo_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: current_logo_key
    type: std::string
    restore_value: no
    initial_value: '"blank"'
  - id: needs_blank_frame
    type: bool
    restore_value: no
    initial_value: "false"
  - id: selected_logo_source
    type: std::string
    restore_value: yes
    initial_value: '"Auto"'
  - id: requested_logo_source
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: flash_red_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: flash_red_show_red
    type: bool
    restore_value: no
    initial_value: "false"
  - id: score_scroll_message
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: score_scroll_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: last_displayed_score_text
    type: std::string
    restore_value: no
    initial_value: '""'

select:
  - platform: template
    id: logo_source
    name: Logo Source
    optimistic: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "Portland Timbers"
      - "Carolina Hurricanes"
      - "New York Rangers"
      - "Colorado Avalanche"
      - "Montreal Canadiens"
    set_action:
      - lambda: |-
          id(selected_logo_source) = x;
      - script.execute: select_team_logo

switch:
  - platform: template
    id: flash_red_override
    name: Flash Red Override
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(flash_red_active) = true;
          id(flash_red_show_red) = true;
      - component.update: led_matrix_display
    turn_off_action:
      - lambda: |-
          id(flash_red_active) = false;
          id(flash_red_show_red) = false;
      - component.update: led_matrix_display


script:
  - id: select_team_logo
    mode: restart
    then:
      #this script determines which team logo (if any) should be displayed based on the selected source and the current game states, and updates the current_logo_key global variable accordingly. 
      # It also sets a flag to show a blank frame on the next display update to ensure the logo changes immediately.
      - lambda: |-
          std::string selected_team;
          
          if(id(selected_logo_source) == "Off") {
            selected_team = "off";
          }

          // if the selected source is "Auto", determine which team to show based on the current game states and seasons. Prioritize active games in post-season, then any active games, then pre-game for post-season, then any pre-game.


          if(id(selected_logo_source) == "Auto") {

            // For teams in post-season, prefer showing the logo if the game is in post-season.
            auto try_postseason_active = [&](const std::string &state, const std::string &season, const std::string &team) {
              if (selected_team.empty() && state == "IN" && season == "post-season") {
                selected_team = team;
              }
            };

            // If no team is selected yet, try to select based on active games regardless of the selected source.
            auto try_active = [&](const std::string &state, const std::string &team) {
              if (selected_team.empty() && state == "IN") {
                selected_team = team;
              }
            };

            // For teams in post-season, prefer showing the logo if the game is in post-season.
            auto try_postseason_pre = [&](const std::string &state, const std::string &season, const std::string &team) {
              if (selected_team.empty() && state == "PRE" && season == "post-season") {
                selected_team = team;
              }
            };

            // If no team is selected yet, try to select based on pre-game state for post-season games.
            auto try_pre = [&](const std::string &state, const std::string &team) {
              if (selected_team.empty() && state == "PRE") {
                selected_team = team;
              }
            };

            // first try active games in post-season
            try_postseason_active(id(timbers_state).state, id(timbers_season).state, "timbers");
            try_postseason_active(id(hurricanes_state).state, id(hurricanes_season).state, "hurricanes");
            try_postseason_active(id(rangers_state).state, id(rangers_season).state, "rangers");
            try_postseason_active(id(avalanche_state).state, id(avalanche_season).state, "avalanche");
            try_postseason_active(id(canadiens_state).state, id(canadiens_season).state, "canadiens");

            // next try any active games regardless of season
            try_active(id(timbers_state).state, "timbers");
            try_active(id(hurricanes_state).state, "hurricanes");
            try_active(id(rangers_state).state, "rangers");
            try_active(id(avalanche_state).state, "avalanche");
            try_active(id(canadiens_state).state, "canadiens");

            // next try pre-game for post-season games
            if (selected_team.empty()) {
              try_postseason_pre(id(timbers_state).state, id(timbers_season).state, "timbers");
              try_postseason_pre(id(hurricanes_state).state, id(hurricanes_season).state, "hurricanes");
              try_postseason_pre(id(rangers_state).state, id(rangers_season).state, "rangers");
              try_postseason_pre(id(avalanche_state).state, id(avalanche_season).state, "avalanche");
              try_postseason_pre(id(canadiens_state).state, id(canadiens_season).state, "canadiens");
            }

            // finally try any pre-game regardless of season
            if (selected_team.empty()) {
              try_pre(id(timbers_state).state, "timbers");
              try_pre(id(hurricanes_state).state, "hurricanes");
              try_pre(id(rangers_state).state, "rangers");
              try_pre(id(avalanche_state).state, "avalanche");
              try_pre(id(canadiens_state).state, "canadiens");
            }
          }

          // If a specific team is selected, try to use that
          if (id(selected_logo_source) == "Portland Timbers" ||
              id(selected_logo_source) == "Carolina Hurricanes" ||
              id(selected_logo_source) == "New York Rangers" ||
              id(selected_logo_source) == "Colorado Avalanche" ||
              id(selected_logo_source) == "Montreal Canadiens") {
            selected_team = id(selected_logo_source);
          }

          

          id(requested_logo_source) = selected_team;
          

          std::string target_logo_key = "blank";
          if (id(selected_logo_source) == "Portland Timbers") {
            target_logo_key = "timbers";
          } else if (id(selected_logo_source) == "Carolina Hurricanes") {
            target_logo_key = "hurricanes";
          } else if (id(selected_logo_source) == "New York Rangers") {
            target_logo_key = "rangers";
          } else if (id(selected_logo_source) == "Colorado Avalanche") {
            target_logo_key = "avalanche";
          } else if (id(selected_logo_source) == "Montreal Canadiens") {
            target_logo_key = "canadiens";
          } else if (!id(requested_logo_source).empty()) {
            target_logo_key = id(requested_logo_source);
          }

          id(displayed_logo).publish_state(id(requested_logo_source).empty() ? "None" : id(requested_logo_source).c_str());

          if (target_logo_key != id(current_logo_key)) {
            id(current_logo_key) = target_logo_key;
            id(needs_blank_frame) = true;
          }
      # set displayed_logo text sensor to the team name for the currently displayed logo (or "Off" if off, or "None" if blank)
      - component.update: led_matrix_display
      - delay: 25ms
      - component.update: score_matrix_display
      # log that the logo was updated to serial for debugging
      - lambda: |-
          ESP_LOGD("main", "Selected logo: %s", id(current_logo_key).c_str());
          
