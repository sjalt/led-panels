# this yaml is for the living room LED display using ESPHome on home assistant. 
# it is connected to four 8x32 panels arranged as a 32x32 grid.
# the goal is to have this display the logo of the current sports team playing via the team tracker integration
substitutions:
  panel_data_pin: GPIO2
  matrix_width: "32"
  matrix_height: "32"
  score_panel_width: "32"
  score_panel_height: "8"
  # Use a path inside /config so ESPHome can access files during compile.
  logo_base_path: /config/esphome/logos
  # Attribute containing the current game's team logo URL.
  team_logo_attribute: team_logo
  team_score_attribute: team_score
  opponent_score_attribute: opponent_score
  team_colors_attribute: team_colors
  opponent_colors_attribute: opponent_colors
  next_game_datetime_attribute: date
  timbers_tracker_entity: sensor.mls_portland_timbers
  hurricanes_tracker_entity: sensor.nhl_carolina_hurricanes
  rangers_tracker_entity: sensor.nhl_new_york_rangers
  avalanche_tracker_entity: sensor.nhl_colorado_avalanche
  canadiens_tracker_entity: sensor.nhl_montreal_canadiens

esphome:
  name: "livingroom-led-display"
  friendly_name: livingroom_led_display
  min_version: 2026.4.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - lambda: |-
          auto call = id(panel_leds).turn_on();
          //call.set_brightness(id(matrix_brightness_percent));
          call.perform();

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - script.execute: select_team_logo

interval:
  - interval: 15min
    then:
      - script.execute: select_team_logo

globals:
  - id: last_team_logo_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: current_logo_key
    type: std::string
    restore_value: no
    initial_value: '"blank"'
  - id: needs_blank_frame
    type: bool
    restore_value: no
    initial_value: "false"
  - id: selected_logo_source
    type: std::string
    restore_value: yes
    initial_value: '"Auto"'
  # - id: matrix_brightness_percent
  #   type: float
  #   restore_value: yes
  #   initial_value: "0.40"
  - id: requested_logo_source
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: timbers_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "true"
  - id: hurricanes_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "true"
  - id: rangers_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "true"
  - id: avalanche_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "true"
  - id: canadiens_logo_downloaded
    type: bool
    restore_value: no
    initial_value: "true"
  - id: flash_red_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: flash_red_show_red
    type: bool
    restore_value: no
    initial_value: "false"
  - id: score_scroll_message
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: score_scroll_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: last_displayed_score_text
    type: std::string
    restore_value: no
    initial_value: '""'

select:
  - platform: template
    id: logo_source
    name: Logo Source
    optimistic: true
    initial_option: Auto
    options:
      - "Auto"
      - "Portland Timbers"
      - "Carolina Hurricanes"
      - "New York Rangers"
      - "Colorado Avalanche"
      - "Montreal Canadiens"
    set_action:
      - lambda: |-
          id(selected_logo_source) = x;
      - script.execute: select_team_logo

switch:
  - platform: template
    id: flash_red_override
    name: Flash Red Override
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(flash_red_active) = true;
          id(flash_red_show_red) = true;
      - component.update: led_matrix_display
    turn_off_action:
      - lambda: |-
          id(flash_red_active) = false;
          id(flash_red_show_red) = false;
      - script.execute: select_team_logo


script:
  - id: select_team_logo
    mode: restart
    then:
      - lambda: |-
          std::string selected_team;
          
          // First try to select the team based on the selected source, if it's available.
          auto select_if_present = [&](const std::string &name, bool downloaded_ok) {
            if (selected_team.empty() && downloaded_ok) {
              selected_team = name;
            }
          };

          // If a specific team is selected, try to use that if the logo is downloaded.
          if (id(selected_logo_source) == "Portland Timbers") {
            select_if_present("timbers", id(timbers_logo_downloaded));
          } else if (id(selected_logo_source) == "Carolina Hurricanes") {
            select_if_present("hurricanes", id(hurricanes_logo_downloaded));
          } else if (id(selected_logo_source) == "New York Rangers") {
            select_if_present("rangers", id(rangers_logo_downloaded));
          } else if (id(selected_logo_source) == "Colorado Avalanche") {
            select_if_present("avalanche", id(avalanche_logo_downloaded));
          } else if (id(selected_logo_source) == "Montreal Canadiens") {
            select_if_present("canadiens", id(canadiens_logo_downloaded));
          }

          // Helper to determine if a game state should be considered active/ongoing.
          auto is_active_game = [](const std::string &state) {
            return !state.empty() && state != "PRE" && state != "NOT_FOUND" && state != "POST" && state != "FINAL";
          };
          
          // For teams in post-season, prefer showing the logo if the game is in post-season and the logo is downloaded.
          auto try_postseason_active = [&](const std::string &state, const std::string &season, bool downloaded_ok, const std::string &team) {
            if (selected_team.empty() && is_active_game(state) && season == "post-season" && downloaded_ok) {
              selected_team = team;
            }
          };

          // If no team is selected yet, try to select based on active games regardless of the selected source.
          auto try_active = [&](const std::string &state, bool downloaded_ok, const std::string &team) {
            if (selected_team.empty() && is_active_game(state) && downloaded_ok) {
              selected_team = team;
            }
          };

          // For teams in post-season, prefer showing the logo if the game is in post-season and the logo is downloaded.
          auto try_postseason_pre = [&](const std::string &state, const std::string &season, bool downloaded_ok, const std::string &team) {
            if (selected_team.empty() && state == "PRE" && season == "post-season" && downloaded_ok) {
              selected_team = team;
            }
          };

          // If no team is selected yet, try to select based on pre-game state for post-season games.
          auto try_pre = [&](const std::string &state, bool downloaded_ok, const std::string &team) {
            if (selected_team.empty() && state == "PRE" && downloaded_ok) {
              selected_team = team;
            }
          };

          if (id(selected_logo_source) == "Auto") {
            // first try active games in post-season
            try_postseason_active(id(timbers_state).state, id(timbers_season).state, id(timbers_logo_downloaded), "timbers");
            try_postseason_active(id(hurricanes_state).state, id(hurricanes_season).state, id(hurricanes_logo_downloaded), "hurricanes");
            try_postseason_active(id(rangers_state).state, id(rangers_season).state, id(rangers_logo_downloaded), "rangers");
            try_postseason_active(id(avalanche_state).state, id(avalanche_season).state, id(avalanche_logo_downloaded), "avalanche");
            try_postseason_active(id(canadiens_state).state, id(canadiens_season).state, id(canadiens_logo_downloaded), "canadiens");

            // next try any active games regardless of season
            try_active(id(timbers_state).state, id(timbers_logo_downloaded), "timbers");
            try_active(id(hurricanes_state).state, id(hurricanes_logo_downloaded), "hurricanes");
            try_active(id(rangers_state).state, id(rangers_logo_downloaded), "rangers");
            try_active(id(avalanche_state).state, id(avalanche_logo_downloaded), "avalanche");
            try_active(id(canadiens_state).state, id(canadiens_logo_downloaded), "canadiens");

            // next try pre-game for post-season games
            if (selected_team.empty()) {
              try_postseason_pre(id(timbers_state).state, id(timbers_season).state, id(timbers_logo_downloaded), "timbers");
              try_postseason_pre(id(hurricanes_state).state, id(hurricanes_season).state, id(hurricanes_logo_downloaded), "hurricanes");
              try_postseason_pre(id(rangers_state).state, id(rangers_season).state, id(rangers_logo_downloaded), "rangers");
              try_postseason_pre(id(avalanche_state).state, id(avalanche_season).state, id(avalanche_logo_downloaded), "avalanche");
              try_postseason_pre(id(canadiens_state).state, id(canadiens_season).state, id(canadiens_logo_downloaded), "canadiens");
            }

            // finally try any pre-game regardless of season
            if (selected_team.empty()) {
              try_pre(id(timbers_state).state, id(timbers_logo_downloaded), "timbers");
              try_pre(id(hurricanes_state).state, id(hurricanes_logo_downloaded), "hurricanes");
              try_pre(id(rangers_state).state, id(rangers_logo_downloaded), "rangers");
              try_pre(id(avalanche_state).state, id(avalanche_logo_downloaded), "avalanche");
              try_pre(id(canadiens_state).state, id(canadiens_logo_downloaded), "canadiens");
            }
          }

          id(requested_logo_source) = selected_team;
          

          std::string target_logo_key = "blank";
          if (id(selected_logo_source) == "Off") {
            target_logo_key = "off";
          } else if (id(selected_logo_source) == "Portland Timbers") {
            target_logo_key = "timbers";
          } else if (id(selected_logo_source) == "Carolina Hurricanes") {
            target_logo_key = "hurricanes";
          } else if (id(selected_logo_source) == "New York Rangers") {
            target_logo_key = "rangers";
          } else if (id(selected_logo_source) == "Colorado Avalanche") {
            target_logo_key = "avalanche";
          } else if (id(selected_logo_source) == "Montreal Canadiens") {
            target_logo_key = "canadiens";
          } else if (!id(requested_logo_source).empty()) {
            target_logo_key = id(requested_logo_source);
          }

          if (target_logo_key != id(current_logo_key)) {
            id(current_logo_key) = target_logo_key;
            id(needs_blank_frame) = true;
          }

          

      # set displayed_logo text sensor to the team name for the currently displayed logo (or "Off" if off, or "None" if blank)
      - lambda: |-
          if (id(current_logo_key) == "off") {
            id(displayed_logo).publish_state("Off");
          } else if (id(current_logo_key) == "timbers") {
            id(displayed_logo).publish_state("Portland Timbers");
          } else if (id(current_logo_key) == "hurricanes") {
            id(displayed_logo).publish_state("Carolina Hurricanes");
          } else if (id(current_logo_key) == "rangers") {
            id(displayed_logo).publish_state("New York Rangers");
          } else if (id(current_logo_key) == "avalanche") {
            id(displayed_logo).publish_state("Colorado Avalanche");
          } else if (id(current_logo_key) == "canadiens") {
            id(displayed_logo).publish_state("Montreal Canadiens");
          } else {
            id(displayed_logo).publish_state("None");
          }
      - component.update: led_matrix_display
      - delay: 25ms
      - component.update: led_matrix_display
      - component.update: score_matrix_display

