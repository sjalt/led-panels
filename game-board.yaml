# get the current state of each team from the Home Assistant sensor and display it on the scoreboard
text_sensor:
  # Timbers
    - &timbers_tracker
      platform: homeassistant
      id: timbers_state
      entity_id: ${timbers_tracker_entity}
      on_value:
        if:
        # if the timbers state changes, and the selected team is the timbers, we run the update_displayed_values script to update the displayed values for the timbers.
          condition:
            or:
              - lambda: 'return id(selected_team) == "Portland Timbers";'
              - lambda: 'return id(selected_team) == "Auto";'
          then:
            - script.execute: auto_team_select
    - <<: *timbers_tracker
      id: timbers_season
      attribute: season
    - <<: *timbers_tracker
      id: timbers_logo
      attribute: ${team_logo_attribute}
    - <<: *timbers_tracker
      id: timbers_opponent_logo
      attribute: ${opponent_logo_attribute}
      on_value:
        then:
          - if:
              condition:
                lambda: 'return !x.empty();'
              then:
                - online_image.set_url:
                    id: timbers_opponent_logo_image
                    url: !lambda 'return x;'
                - component.update: timbers_opponent_logo_image
    - <<: *timbers_tracker
      id: timbers_team_colors
      attribute: ${team_colors_attribute}
    - <<: *timbers_tracker
      id: timbers_opponent_colors
      attribute: ${opponent_colors_attribute}
    - <<: *timbers_tracker
      id: timbers_next_game_datetime
      attribute: ${next_game_datetime_attribute}
    - <<: *timbers_tracker
      id: timbers_team_score
      attribute: ${team_score_attribute}
      on_value:
        if:
        # if the timbers team score changes, and the selected team is the timbers, we run the update_displayed_values script to update the displayed values for the timbers.
          condition:
            and:
              - lambda: 'return id(selected_team) == "Portland Timbers";'
              - lambda: 'return id(displayed_team_score) != x;'
          then:
            - script.execute: update_displayed_values
    - <<: *timbers_tracker
