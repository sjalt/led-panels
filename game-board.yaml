# Board: Generic ESP32-S3 Board (Generic)
# Definition: definitions/boards/generic-esp32s3/manifest.yaml

esphome:
  name: game-board
  friendly_name: game-board
  on_boot:
    - priority: -100.0
      then:
        - lambda: |-
            id(logos_boot_refresh_in_progress) = true;
            id(logos_boot_refresh_pending_count) = 0;
            id(logos_boot_refresh_completed_count) = 0;
            id(timbers_opponent_logo_ready) = false;
            id(hurricanes_opponent_logo_ready) = false;
            id(rangers_opponent_logo_ready) = false;
            id(avalanche_opponent_logo_ready) = false;
            id(canadiens_opponent_logo_ready) = false;
        - script.execute: refresh_all_opponent_logos
        - script.execute: auto_team_select
        - script.execute: update_displayed_values

esp32:
  variant: esp32s3
  framework:
    type: esp-idf



api:
  encryption:
    key: !secret game_board__encryption_key
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: game-board Fallback Hotspot
    password: !secret game_board__ap_password
captive_portal:

psram:
  speed: 80MHz
  mode: octal

# Enable logging
logger:
  
display:
- platform: hub75
  id: led_panel_display
  # shift_driver: FM6124
  # we will have the brightness adjusted by the room brightness sensor, so set a default value.
  # can be set between 0-255, where 0 is off and 255 is full brightness.
  brightness : 128
  panel_width: 128
  panel_height: 64
  # update_interval: 16ms
  # we will update the display using scripts (display.update: led_panel_display) so set the update interval to never.
  update_interval: never
  r1_pin: GPIO18
  g1_pin: GPIO8
  b1_pin: GPIO17
  r2_pin: GPIO16
  b2_pin: GPIO15
  g2_pin: GPIO1
  a_pin: GPIO7
  b_pin: GPIO48
  c_pin: GPIO6
  d_pin: GPIO47
  e_pin: GPIO2
  clk_pin: GPIO5
  lat_pin: GPIO21
  oe_pin: GPIO4
  rotation: 0



substitutions:
  # Use a path inside /config so ESPHome can access files during compile.
  logo_base_path: /config/esphome/logos
  # Attribute containing the current game's team logo URL.
  team_logo_attribute: team_logo
  opponent_logo_attribute: opponent_logo
  team_score_attribute: team_score
  opponent_score_attribute: opponent_score
  team_colors_attribute: team_colors
  opponent_colors_attribute: opponent_colors
  next_game_datetime_attribute: date
  timbers_tracker_entity: sensor.mls_portland_timbers
  hurricanes_tracker_entity: sensor.nhl_carolina_hurricanes
  rangers_tracker_entity: sensor.nhl_new_york_rangers
  avalanche_tracker_entity: sensor.nhl_colorado_avalanche
  canadiens_tracker_entity: sensor.nhl_montreal_canadiens

  room_brightness_sensor: sensor.living_room_occupancy_illuminance

globals:
  # this global variable will hold the current team being displayed on the scoreboard, so we can determine if we need to update the display when the game state changes.
  - id: displayed_team
    type: std::string
    restore_value: true
  - id: selected_team
    type: std::string
    restore_value: true
    initial_value: '"Auto"'
  - id: displayed_state
    type: std::string
    restore_value: true
  - id: displayed_season
    type: std::string
    restore_value: true
  - id: displayed_logo
    type: std::string
    restore_value: true
  - id: displayed_opponent_logo
    type: std::string
    restore_value: true
  - id: displayed_team_colors
    type: std::string
    restore_value: true
  - id: displayed_opponent_colors
    type: std::string
    restore_value: true
  - id: displayed_next_game_datetime
    type: std::string
    restore_value: true
  - id: displayed_team_score
    type: std::string
    restore_value: true
  - id: displayed_opponent_score
    type: std::string
    restore_value: true
  - id: displayed_team_primary_color
    type: Color
    restore_value: true
  - id: displayed_team_secondary_color
    type: Color
    restore_value: true
  - id: displayed_opponent_primary_color
    type: Color
    restore_value: true
  - id: displayed_opponent_secondary_color
    type: Color
    restore_value: true
  - id: current_team_logo_url
    type: std::string
    restore_value: true
  - id: current_opponent_logo_url
    type: std::string
    restore_value: true
  - id: team_logo_downloaded
    type: bool
    restore_value: true
  - id: opponent_logo_downloaded
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: logos_boot_refresh_in_progress
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: logos_boot_refresh_pending_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: logos_boot_refresh_completed_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: timbers_opponent_logo_ready
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: hurricanes_opponent_logo_ready
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: rangers_opponent_logo_ready
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: avalanche_opponent_logo_ready
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: canadiens_opponent_logo_ready
    type: bool
    restore_value: false
    initial_value: 'false'




