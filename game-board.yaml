            if (!id(timbers_opponent_logo_ready)) {
              id(timbers_opponent_logo_ready) = true;
              id(logos_boot_refresh_completed_count) += 1;
              if (id(logos_boot_refresh_pending_count) > 0) {
                id(logos_boot_refresh_pending_count) -= 1;
