esphome:
  name: "kegerator"
  friendly_name: Kegerator

esp32:
  variant: ESP32C3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret kegerator__encryption_key

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

sensor:
  - platform: hx711
    name: seltzer
    internal: true
    clk_pin: GPIO4
    dout_pin: GPIO3
    id: sensor_hx711_1
    update_interval: 1min   
    gain: "128"

  - platform: template
    name: keg fullness
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 1min
    lambda: |-
      const float raw = id(sensor_hx711_1).state;
      const float empty = id(keg_empty_raw);
      const float full = id(keg_full_raw);

      if (isnan(raw) || isnan(empty) || isnan(full) || full <= empty) {
        return NAN;
      }

      float fullness = (raw - empty) * 100.0f / (full - empty);
      if (fullness < 0.0f) {
        fullness = 0.0f;
      }
      if (fullness > 100.0f) {
        fullness = 100.0f;
      }
      return fullness;

globals:
  - id: keg_empty_raw
    type: float
    restore_value: true
    initial_value: '0.0'
  - id: keg_full_raw
    type: float
    restore_value: true
    initial_value: '100.0'

number:
  - platform: template
    name: keg empty raw
    id: keg_empty_raw_number
    entity_category: config
    mode: box
    min_value: -20000000.0
    max_value: 20000000.0
    step: 1.0
    lambda: |-
      return id(keg_empty_raw);
    set_action:
      - lambda: |-
          id(keg_empty_raw) = x;

  - platform: template
    name: keg full raw
    id: keg_full_raw_number
    entity_category: config
    mode: box
    min_value: -20000000.0
    max_value: 20000000.0
    step: 1.0
    lambda: |-
      return id(keg_full_raw);
    set_action:
      - lambda: |-
          id(keg_full_raw) = x;

button:
  - platform: template
    name: set keg empty calibration
    entity_category: config
    on_press:
      - lambda: |-
          id(keg_empty_raw) = id(sensor_hx711_1).state;
          id(keg_empty_raw_number).publish_state(id(keg_empty_raw));

  - platform: template
    name: set keg full calibration
    entity_category: config
    on_press:
      - lambda: |-
          id(keg_full_raw) = id(sensor_hx711_1).state;
          id(keg_full_raw_number).publish_state(id(keg_full_raw));
    